name: Update Intelligence

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Collector
        run: |
          python scripts/fetch_intel.py

      - name: Commit changes
        run: |

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/live-intel.json

          git diff --staged --quiet || git commit -m "Update live intelligence"

          git push
