name: Update CZIB

on:
  workflow_dispatch:
  schedule:
    schedule:
  - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download CZIB JSON
  run: |
    curl -L "https://www.easa.europa.eu/en/domains/air-operations/czibs/export-json?_format=json" -o czib-raw.json

    echo "{\"generated_at\":\"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\",\"conflict_zones\":" > data/czib-live.json

    cat czib-raw.json >> data/czib-live.json

    echo "}" >> data/czib-live.json
      - name: Commit updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/czib-live.json

          git diff --staged --quiet || git commit -m "Auto update CZIB data"

          git push
